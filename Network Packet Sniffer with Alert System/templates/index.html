<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Sniffer Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="pulse"></span> Real-time Network Monitor</h1>
            <div class="stats-row">
                <div class="stat-card">
                    <h3>Total Packets</h3>
                    <p id="total-packets">0</p>
                </div>
                <div class="stat-card alert">
                    <h3>Active Alerts</h3>
                    <p id="total-alerts">0</p>
                </div>
                <div class="stat-card">
                    <h3>Current Speed</h3>
                    <p id="current-pps">0 pps</p>
                </div>
            </div>
        </header>

        <main>
            <div class="chart-container card">
                <canvas id="trafficChart"></canvas>
            </div>

            <div class="tables-row">
                <div class="table-container card">
                    <h2>Live Packet Stream</h2>
                    <table id="packet-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Protocol</th>
                                <th>Source IP</th>
                                <th>Dest IP</th>
                                <th>Port</th>
                                <th>Length</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- New packets will be added here -->
                        </tbody>
                    </table>
                </div>

                <div class="table-container card">
                    <h2>Recent Alerts</h2>
                    <div id="alert-list" class="alert-list">
                        <!-- Alerts will be added here -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
