<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Templates</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #2c3e50; color: white; min-height: 100vh; padding: 20px; }
        .sidebar a { display: block; color: #bdc3c7; text-decoration: none; padding: 10px 0; border-bottom: 1px solid #34495e; }
        .main-content { flex: 1; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .btn { background: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>PhishSim Admin</h2>
        <a href="/">Dashboard</a>
        <a href="/templates">Templates</a>
        <a href="/targets">Targets</a>
    </div>
    <div class="main-content">
        <div class="card">
            <h2>Add New Template</h2>
            <form action="/templates" method="post">
                <input type="text" name="name" placeholder="Template Name (e.g., Office365 Login)" required>
                <input type="text" name="subject" placeholder="Email Subject" required>
                <textarea name="body" rows="10" placeholder="HTML Body (use {{link}} for the phish link)" required></textarea>
                <button type="submit" class="btn">Save Template</button>
            </form>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>Existing Templates</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Subject</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for template in templates %}
                    <tr>
                        <td>{{ template.id }}</td>
                        <td>{{ template.name }}</td>
                        <td>{{ template.subject }}</td>
                        <td>Edit / Delete</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
