<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Shield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Privacy Shield</h1>
      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="extensionToggle" checked>
          <span class="slider round"></span>
        </label>
      </div>
    </header>

    <div class="stats-card">
      <div class="stat">
        <span class="stat-value" id="currentTabCount">0</span>
        <span class="stat-label">Blocked on this page</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">Total blocked</span>
      </div>
    </div>

    <div class="actions">
      <button id="openDashboard" class="btn">View Dashboard</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
